name: Diagnose ChatGPT hotfix patch

on:
  push:
    branches:
      - agent/chatgpt-map-performance

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chatgpt-map-performance
          fetch-depth: 0

      - name: Run patch and retain validation diagnostics
        shell: bash
        run: |
          set +e
          : > /tmp/contextport-hotfix.log
          python3 - <<'PY' >> /tmp/contextport-hotfix.log 2>&1
          import base64
          import gzip
          from pathlib import Path

          encoded = Path('.github/contextport_hotfix_patch.py.gz.b64').read_text().strip()
          patch = gzip.decompress(base64.b64decode(encoded))
          Path('/tmp/contextport_hotfix_patch.py').write_bytes(patch)
          print('decoded_patch_bytes=', len(patch))
          PY
          decode_status=$?
          echo "decode_exit_status=$decode_status" >> /tmp/contextport-hotfix.log
          python3 /tmp/contextport_hotfix_patch.py >> /tmp/contextport-hotfix.log 2>&1
          patch_status=$?
          echo "patch_exit_status=$patch_status" >> /tmp/contextport-hotfix.log

          files=(
            ChatGPTWebView/Developer/DeveloperSourcesModel.swift
            ChatGPTWebView/Developer/DeveloperSourceBrowserInventory.swift
            ChatGPTWebView/Developer/DeveloperSourceMapRecovery.swift
            ChatGPTWebView/Developer/DeveloperSourceMemoryArchive.swift
            ChatGPTWebView/Web/ChatGPTWebViewChatPerformance.swift
            ChatGPTWebView/Web/ChatGPTWebViewLatestExchange.swift
            ChatGPTWebView/Web/ChatGPTConversationMapCapture.swift
            ChatGPTWebView/Web/ChatGPTConversationExporter.swift
          )
          for file in "${files[@]}"; do
            echo >> /tmp/contextport-hotfix.log
            echo "=== swift parse: $file ===" >> /tmp/contextport-hotfix.log
            xcrun swiftc -frontend -parse "$file" >> /tmp/contextport-hotfix.log 2>&1
            echo "swift_parse_exit_status=$?" >> /tmp/contextport-hotfix.log
          done

          echo >> /tmp/contextport-hotfix.log
          echo "=== extract map capture script ===" >> /tmp/contextport-hotfix.log
          python3 - <<'PY' >> /tmp/contextport-hotfix.log 2>&1
          import pathlib, re
          source = pathlib.Path('ChatGPTWebView/Web/ChatGPTConversationMapCapture.swift').read_text()
          match = re.search(r'private static let captureScript = #"""(.*?)"""#', source, re.S)
          print('capture_script_found=', bool(match))
          if match:
              body = match.group(1)
              pathlib.Path('/tmp/chatgpt-map-capture.js').write_text(
                  'async function capture(conversationID) {\n' + body + '\n}\nmodule.exports = capture;\n'
              )
          PY
          extract_status=$?
          echo "extract_exit_status=$extract_status" >> /tmp/contextport-hotfix.log
          if [ -f /tmp/chatgpt-map-capture.js ]; then
            node --check /tmp/chatgpt-map-capture.js >> /tmp/contextport-hotfix.log 2>&1
            echo "node_check_exit_status=$?" >> /tmp/contextport-hotfix.log
          fi

          echo >> /tmp/contextport-hotfix.log
          echo "=== diff check ===" >> /tmp/contextport-hotfix.log
          git diff --check >> /tmp/contextport-hotfix.log 2>&1
          echo "diff_check_exit_status=$?" >> /tmp/contextport-hotfix.log

          echo >> /tmp/contextport-hotfix.log
          echo "=== changed paths ===" >> /tmp/contextport-hotfix.log
          git status --short >> /tmp/contextport-hotfix.log 2>&1

          set -e
          cp /tmp/contextport-hotfix.log .github/hotfix-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/hotfix-diagnostic.txt
          git commit -m "Record decoded ChatGPT hotfix validation diagnostic"
          git push origin HEAD:agent/chatgpt-map-performance
