name: Squash clean ChatGPT hotfix source branch

on:
  push:
    branches:
      - agent/chatgpt-map-performance

permissions:
  contents: write

jobs:
  squash-source:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chatgpt-map-performance-source-v2
          fetch-depth: 0

      - name: Prove exact source diff before squashing
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess
          expected = {
              'ChatGPTWebView/Developer/DeveloperSourceBrowserInventory.swift',
              'ChatGPTWebView/Developer/DeveloperSourceMapRecovery.swift',
              'ChatGPTWebView/Developer/DeveloperSourceMemoryArchive.swift',
              'ChatGPTWebView/Developer/DeveloperSourcesModel.swift',
              'ChatGPTWebView/Web/ChatGPTConversationExporter.swift',
              'ChatGPTWebView/Web/ChatGPTConversationMapCapture.swift',
              'ChatGPTWebView/Web/ChatGPTWebViewChatPerformance.swift',
              'ChatGPTWebView/Web/ChatGPTWebViewLatestExchange.swift',
              'project.yml',
          }
          actual = set(subprocess.check_output([
              'git', 'diff', '--name-only',
              'ae271328f1eff79262d4b8095e459239031f0da9...HEAD'
          ], text=True).splitlines())
          if actual != expected:
              raise SystemExit(f'Unexpected source scope before squash: {sorted(actual)}')
          PY
          git diff --check ae271328f1eff79262d4b8095e459239031f0da9...HEAD

      - name: Squash onto exact build 73 head
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git reset --soft ae271328f1eff79262d4b8095e459239031f0da9
          git commit -m "Fix ChatGPT map capture and live source pressure"
          git push --force origin HEAD:agent/chatgpt-map-performance-source-v2
