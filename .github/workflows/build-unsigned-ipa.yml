name: Build ContextPort Unsigned IPA

on:
  push:
    branches:
      - main
    paths:
      - "**/*.swift"
      - "**/*.xcodeproj/**"
      - "**/*.xcworkspace/**"
      - ".github/workflows/build-unsigned-ipa.yml"
  pull_request:
    paths:
      - "**/*.swift"
      - "**/*.xcodeproj/**"
      - "**/*.xcworkspace/**"
      - ".github/workflows/build-unsigned-ipa.yml"
  workflow_dispatch:
    inputs:
      project_path:
        description: "Optional .xcodeproj or .xcworkspace path. Leave blank to auto-detect."
        required: false
        default: ""
      scheme:
        description: "Optional Xcode scheme. Leave blank to auto-detect the first shared scheme."
        required: false
        default: ""
      configuration:
        description: "Xcode build configuration"
        required: false
        default: "Release"
      deployment_target:
        description: "Minimum iOS deployment target"
        required: false
        default: "16.0"

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    name: Build ContextPort unsigned IPA for iOS 16
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Detect Xcode project and scheme
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_INPUT="${{ github.event.inputs.project_path || '' }}"
          SCHEME_INPUT="${{ github.event.inputs.scheme || '' }}"

          if [ -n "$PROJECT_INPUT" ]; then
            PROJECT_PATH="$PROJECT_INPUT"
          else
            PROJECT_PATH="$(find . -maxdepth 4 \( -name '*.xcworkspace' -o -name '*.xcodeproj' \) | sort | head -n 1 || true)"
          fi

          if [ -z "$PROJECT_PATH" ]; then
            printf '%s\n' \
              '# IPA build audit' \
              '' \
              'Status: not buildable yet' \
              '' \
              'No .xcodeproj or .xcworkspace was found in this repository.' \
              '' \
              'To build an IPA, commit the actual Xcode source project, then rerun this workflow.' \
              '' \
              "Minimum iOS deployment target configured by this workflow: ${{ github.event.inputs.deployment_target || '16.0' }}" \
              > ipa-build-audit.md

            echo "can_build=false" >> "$GITHUB_OUTPUT"
            echo "No .xcodeproj or .xcworkspace found. Marking this run as an audit result instead of a build failure."
            exit 0
          fi

          if [[ "$PROJECT_PATH" == *.xcworkspace ]]; then
            BUILD_KIND="workspace"
            BUILD_FLAG="-workspace"
          else
            BUILD_KIND="project"
            BUILD_FLAG="-project"
          fi

          if [ -n "$SCHEME_INPUT" ]; then
            SCHEME="$SCHEME_INPUT"
          else
            xcodebuild -list "$BUILD_FLAG" "$PROJECT_PATH" -json > /tmp/xcode-list.json
            SCHEME="$(python3 -c 'import json, sys; data=json.load(open("/tmp/xcode-list.json", encoding="utf-8")); schemes=[]; [schemes.extend(data.get(k, {}).get("schemes", [])) for k in ("workspace", "project")]; print(schemes[0]) if schemes else sys.exit(1)')"
          fi

          if [ -z "$SCHEME" ]; then
            echo "No shared Xcode scheme found. Commit a shared scheme or provide one manually when running the workflow." >&2
            exit 21
          fi

          echo "can_build=true" >> "$GITHUB_OUTPUT"
          echo "project_path=$PROJECT_PATH" >> "$GITHUB_OUTPUT"
          echo "build_flag=$BUILD_FLAG" >> "$GITHUB_OUTPUT"
          echo "build_kind=$BUILD_KIND" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

          echo "Detected $BUILD_KIND: $PROJECT_PATH"
          echo "Detected scheme: $SCHEME"

      - name: Upload audit result when source is missing
        if: steps.detect.outputs.can_build == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ContextPort-ipa-build-audit
          path: ipa-build-audit.md
          if-no-files-found: error
          retention-days: 14

      - name: Archive app without signing
        if: steps.detect.outputs.can_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build

          DEPLOYMENT_TARGET="${{ github.event.inputs.deployment_target || '16.0' }}"
          CONFIGURATION="${{ github.event.inputs.configuration || 'Release' }}"

          echo "Building configuration: $CONFIGURATION"
          echo "Minimum iOS deployment target: $DEPLOYMENT_TARGET"

          xcodebuild clean archive \
            "${{ steps.detect.outputs.build_flag }}" "${{ steps.detect.outputs.project_path }}" \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" \
            IPHONEOS_DEPLOYMENT_TARGET="$DEPLOYMENT_TARGET" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package ContextPort unsigned IPA
        if: steps.detect.outputs.can_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build/App.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -n 1 || true)"

          if [ -z "$APP_PATH" ]; then
            echo "Archive completed but no .app was found under Products/Applications." >&2
            exit 22
          fi

          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry ContextPort-ios16-unsigned.ipa Payload)
          ls -lh build/ContextPort-ios16-unsigned.ipa

      - name: Upload ContextPort IPA artifact
        if: steps.detect.outputs.can_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ContextPort-ios16-unsigned-ipa
          path: build/ContextPort-ios16-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
