name: Apply Memory naming patch

on:
  push:
    branches:
      - agent/fix-chatgpt-claude-save-context
    paths:
      - .github/workflows/apply-memory-naming.yml
      - .github/patches/contextport-memory-naming.patch

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-chatgpt-claude-save-context
          fetch-depth: 0

      - name: Apply verified patch
        run: |
          git apply --check .github/patches/contextport-memory-naming.patch
          git apply .github/patches/contextport-memory-naming.patch

      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChatGPTWebView/Web/ChatGPTTabView.swift project.yml
          git commit -m "Add custom Memory naming"
          git push
