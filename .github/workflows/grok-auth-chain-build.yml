name: Grok Auth Chain Build

on:
  push:
    branches:
      - codex/multi-ai-architecture

permissions:
  contents: read

jobs:
  grok-auth-chain:
    runs-on: macos-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Parse Swift sources
        shell: bash
        run: |
          set -euo pipefail
          swiftc -frontend -parse ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          swiftc -frontend -parse ChatGPTWebView/App/AIProvider.swift

      - name: Install XcodeGen
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          xcodegen generate
          test -f ChatGPTWebView.xcodeproj/project.pbxproj

      - name: Archive unsigned app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild clean archive \
            -project ChatGPTWebView.xcodeproj \
            -scheme ChatGPTWebView \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ChatGPTWebView.xcarchive" \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ChatGPTWebView.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -n 1)"
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry ChatGPT-WebView-grok-auth-chain.ipa Payload)

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-grok-auth-chain
          path: build/ChatGPT-WebView-grok-auth-chain.ipa
          retention-days: 14
