name: Apply In-App Progressive Settings

on:
  push:
    branches:
      - agent/progressive-chat-access-buckets
    paths:
      - scripts/patch_in_app_progressive_settings.py
      - .github/workflows/apply-in-app-progressive-settings.yml

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/progressive-chat-access-buckets
          fetch-depth: 0

      - name: Patch in-app Settings
        run: python3 scripts/patch_in_app_progressive_settings.py

      - name: Remove temporary patch files
        run: |
          rm scripts/patch_in_app_progressive_settings.py
          rm .github/workflows/apply-in-app-progressive-settings.yml

      - name: Commit patched Settings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChatGPTWebView/App/RootView.swift project.yml scripts .github/workflows
          git commit -m "Move bucket controls into in-app settings [skip ci]"
          git push origin HEAD:agent/progressive-chat-access-buckets
