name: Build ContextPort Source iOS 16 IPA

on:
  push:
    branches:
      - main
      - phase2/supabase-memory-ui
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  pull_request:
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-build70-state-fixes:
    name: Apply validated build 70 state fixes
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/add-deepseek-provider'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/add-deepseek-provider
          fetch-depth: 0

      - name: Extract and apply validated patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import re
          import subprocess
          from pathlib import Path

          helper = Path('.github/workflows/apply-build70-patch.yml')
          text = helper.read_text(encoding='utf-8')
          match = re.search(r'payload = """([A-Za-z0-9+/=]+)"""', text)
          if not match:
              raise SystemExit('Build 70 patch payload was not found.')
          patch = gzip.decompress(base64.b64decode(match.group(1)))
          patch_path = Path('/tmp/contextport-build70.patch')
          patch_path.write_bytes(patch)
          subprocess.run(['git', 'apply', '--check', str(patch_path)], check=True)
          subprocess.run(['git', 'apply', str(patch_path)], check=True)
          PY

      - name: Validate patched state boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'source-fingerprint:' ChatGPTWebView/Developer/DeveloperSourceMemoryArchive.swift
          grep -q 'store.deleteEntry(saved.entry)' ChatGPTWebView/Developer/DeveloperSourceMemoryArchive.swift
          grep -q 'Saved to Memory' ChatGPTWebView/Developer/DeveloperSourcesView.swift
          grep -q 'ChatAttachmentHandoffResult' ChatGPTWebView/Web/ChatGPTWebViewPendingUploads.swift
          grep -q "getAttribute('accept')" ChatGPTWebView/Web/ChatGPTWebViewPendingUploads.swift
          grep -q 'handoff.failedURLs' ChatGPTWebView/Web/ChatGPTTabView.swift
          grep -q 'CURRENT_PROJECT_VERSION: "70"' project.yml
          git diff --check

      - name: Remove temporary staging and restore canonical workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-build70-patch.yml
          git checkout origin/main -- .github/workflows/build-source-ios16-ipa.yml
          test ! -e .github/workflows/apply-build70-patch.yml

      - name: Commit clean source patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix developer source save and attachment state"
          git push origin HEAD:codex/add-deepseek-provider
