name: Build Source iOS 16 IPA

on:
  push:
    branches:
      - main
      - phase2/supabase-memory-ui
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  pull_request:
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  workflow_dispatch:
    inputs:
      deployment_target:
        description: "Minimum iOS deployment target"
        required: false
        default: "16.0"

permissions:
  contents: write

jobs:
  patch-grok-white-screen:
    name: Patch Grok OAuth overlay white screen
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/multi-ai-architecture'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/multi-ai-architecture
          fetch-depth: 0

      - name: Patch Grok OAuth child WebView presentation
        shell: python
        run: |
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"Expected {label} was not found")
              return text.replace(old, new, 1)

          store_path = Path("ChatGPTWebView/Web/ChatGPTWebViewStore.swift")
          store = store_path.read_text()
          lines = store.splitlines(keepends=True)

          host_index = next((i for i, line in enumerate(lines) if "let hostView = mainWebView ?? opener" in line), None)
          if host_index is None:
              raise SystemExit("Expected nested auth popup host line was not found")

          return_index = next((i for i in range(host_index, len(lines)) if "return popupWebView" in lines[i]), None)
          if return_index is None:
              raise SystemExit("Expected auth popup return line was not found")

          indent = lines[host_index].split("let hostView", 1)[0]
          replacement = [
              f"{indent}let sourceView = mainWebView ?? opener\n",
              f"{indent}let hostView = sourceView.superview ?? sourceView\n",
              f"{indent}if hostView === sourceView {{\n",
              f"{indent}    popupWebView.frame = sourceView.bounds\n",
              f"{indent}}} else {{\n",
              f"{indent}    popupWebView.frame = sourceView.convert(sourceView.bounds, to: hostView)\n",
              f"{indent}}}\n",
              f"{indent}popupWebView.autoresizingMask = [.flexibleWidth, .flexibleHeight]\n",
              f"{indent}popupWebView.layer.zPosition = 999\n",
              f"{indent}hostView.addSubview(popupWebView)\n",
              "\n",
              f"{indent}let popupID = ObjectIdentifier(popupWebView)\n",
              f"{indent}authPopupWebViews[popupID] = popupWebView\n",
              f"{indent}trackAuthPopupNavigation(popupWebView, url: initialURL)\n",
              "\n",
              f"{indent}// On iOS, some Grok/xAI popup requests can create the child view before\n",
              f"{indent}// WebKit commits the first navigation into it. Loading the initial request\n",
              f"{indent}// explicitly keeps the overlay from remaining a blank white WKWebView.\n",
              f"{indent}if provider.id == .grok {{\n",
              f"{indent}    DispatchQueue.main.async {{ [weak popupWebView] in\n",
              f"{indent}        popupWebView?.load(URLRequest(url: initialURL))\n",
              f"{indent}    }}\n",
              f"{indent}}}\n",
              "\n",
              f"{indent}return popupWebView\n",
          ]
          lines = lines[:host_index] + replacement + lines[return_index + 1:]
          store = "".join(lines)

          store = replace_once(
              store,
              'let authHost = host == "accounts.x.ai"\n'
              '                || host == "x.com"\n'
              '                || host == "accounts.google.com"\n'
              '                || host == "appleid.apple.com"',
              'let authHost = host == "accounts.x.ai"\n'
              '                || host == "x.ai"\n'
              '                || host.hasSuffix(".x.ai")\n'
              '                || host == "x.com"\n'
              '                || host.hasSuffix(".x.com")\n'
              '                || host == "accounts.google.com"\n'
              '                || host == "appleid.apple.com"\n'
              '                || host == "challenges.cloudflare.com"',
              "Grok auth host block"
          )

          store = replace_once(
              store,
              'guard provider.id == .grok,\n'
              '              isAuthPopup(webView),\n'
              '              let url,\n'
              '              !isGrokURL(url) else {',
              'guard provider.id == .grok,\n'
              '              isAuthPopup(webView),\n'
              '              let url,\n'
              '              url.scheme?.lowercased() == "https",\n'
              '              !isGrokURL(url) else {',
              "Grok popup navigation tracking block"
          )
          store_path.write_text(store)

          project_path = Path("project.yml")
          project = project_path.read_text()
          project = replace_once(
              project,
              'CURRENT_PROJECT_VERSION: "30"',
              'CURRENT_PROJECT_VERSION: "31"',
              "build 30 version line"
          )
          project_path.write_text(project)

      - name: Verify patch shape
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          grep -F 'let sourceView = mainWebView ?? opener' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'sourceView.superview ?? sourceView' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'popupWebView?.load(URLRequest(url: initialURL))' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'host.hasSuffix(".x.ai")' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'url.scheme?.lowercased() == "https"' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'CURRENT_PROJECT_VERSION: "31"' project.yml

      - name: Restore workflow and commit source patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout 68e85df183fbf32bf14d05005bdb33c3d281f549 -- .github/workflows/build-source-ios16-ipa.yml
          git add ChatGPTWebView/Web/ChatGPTWebViewStore.swift project.yml .github/workflows/build-source-ios16-ipa.yml
          git commit -m "Present Grok auth popup as sibling overlay"
          git push origin HEAD:codex/multi-ai-architecture

  build-source-ios16-ipa:
    name: Build source controlled iOS 16 unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          xcodegen generate
          test -f ChatGPTWebView.xcodeproj/project.pbxproj

      - name: Archive app without signing
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          DEPLOYMENT_TARGET="${{ github.event.inputs.deployment_target || '16.0' }}"

          xcodebuild clean archive \
            -project ChatGPTWebView.xcodeproj \
            -scheme ChatGPTWebView \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ChatGPTWebView.xcarchive" \
            IPHONEOS_DEPLOYMENT_TARGET="$DEPLOYMENT_TARGET" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ChatGPTWebView.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -n 1 || true)"

          if [ -z "$APP_PATH" ]; then
            echo "Archive completed but no .app was found under Products/Applications." >&2
            exit 22
          fi

          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry ChatGPT-WebView-phase2-ios16-unsigned.ipa Payload)
          ls -lh build/ChatGPT-WebView-phase2-ios16-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-phase2-ios16-unsigned-ipa
          path: build/ChatGPT-WebView-phase2-ios16-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload generated Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-phase2-generated-xcode-project
          path: |
            ChatGPTWebView.xcodeproj
            project.yml
            ChatGPTWebView
            AppMemory
          if-no-files-found: error
          retention-days: 14
