name: Build ContextPort Source iOS 16 IPA

on:
  push:
    branches:
      - main
      - phase2/supabase-memory-ui
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  pull_request:
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-deepseek-provider-patch:
    name: Apply validated DeepSeek provider patch
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/add-deepseek-provider'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DeepSeek provider branch
        uses: actions/checkout@v4
        with:
          ref: codex/add-deepseek-provider
          fetch-depth: 0

      - name: Apply validated provider patch
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build
          test -f .github/deepseek-provider-patch.py
          test -f .github/deepseek-provider-patch-tail.py
          {
            python3 .github/deepseek-provider-patch.py || true
            python3 .github/deepseek-provider-patch-tail.py
          } 2>&1 | tee build/deepseek-patch.log

      - name: Upload patch diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ContextPort-deepseek-patch-error
          path: build/deepseek-patch.log
          if-no-files-found: error
          retention-days: 1

      - name: Remove temporary helpers and restore canonical workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/deepseek-provider-patch.py
          rm -f .github/deepseek-provider-patch-tail.py
          rm -f .github/deepseek-provider-patch.trigger
          rm -f .github/workflows/apply-deepseek-provider-patch.yml
          git checkout origin/main -- .github/workflows/build-source-ios16-ipa.yml
          test ! -e .github/deepseek-provider-patch.py
          test ! -e .github/deepseek-provider-patch-tail.py
          test ! -e .github/deepseek-provider-patch.trigger
          test ! -e .github/workflows/apply-deepseek-provider-patch.yml

      - name: Commit clean DeepSeek source patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "add native DeepSeek provider foundation"
          git push origin HEAD:codex/add-deepseek-provider
