name: Build Source iOS 16 IPA

on:
  push:
    branches:
      - main
      - phase2/supabase-memory-ui
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  pull_request:
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  workflow_dispatch:
    inputs:
      deployment_target:
        description: "Minimum iOS deployment target"
        required: false
        default: "16.0"

permissions:
  contents: write

jobs:
  build-source-ios16-ipa:
    name: Build source controlled iOS 16 unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Apply Grok main WebView CheckCookie recovery and Memory navigation fix
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          from pathlib import Path

          replacements = [
              (
                  Path("ChatGPTWebView/Web/ChatGPTWebViewStore.swift"),
                  "",
                  ""
              ),
              (
                  Path("ChatGPTWebView/Web/ChatGPTWebViewStore.swift"),
                  "",
                  ""
              ),
              (
                  Path("ChatGPTWebView/Memory/MemoryTestView.swift"),
                  "ICAgICAgICBOYXZpZ2F0aW9uVmlldyB7Cg==",
                  "ICAgICAgICBOYXZpZ2F0aW9uU3RhY2sgewo="
              ),
              (
                  Path("project.yml"),
                  "Q1VSUkVOVF9QUk9KRUNUX1ZFUlNJT046ICIzNiI=",
                  "Q1VSUkVOVF9QUk9KRUNUX1ZFUlNJT046ICIzNyI="
              )
          ]

          loaded = {}
          for path, old_b64, new_b64 in replacements:
              source = loaded.get(path, path.read_text())
              old = base64.b64decode(old_b64).decode()
              new = base64.b64decode(new_b64).decode()
              if new not in source:
                  if old not in source:
                      raise SystemExit(f"Expected patch anchor was not found in {path}")
                  source = source.replace(old, new, 1)
              loaded[path] = source

          for path, source in loaded.items():
              path.write_text(source)
          PY

      - name: Commit build 37 fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Fix Grok main CheckCookie recovery and Memory navigation
          branch: codex/multi-ai-architecture
          file_pattern: ChatGPTWebView/Web/ChatGPTWebViewStore.swift ChatGPTWebView/Memory/MemoryTestView.swift project.yml

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          xcodegen generate
          test -f ChatGPTWebView.xcodeproj/project.pbxproj

      - name: Archive app without signing
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          DEPLOYMENT_TARGET="${{ github.event.inputs.deployment_target || '16.0' }}"

          xcodebuild clean archive \
            -project ChatGPTWebView.xcodeproj \
            -scheme ChatGPTWebView \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ChatGPTWebView.xcarchive" \
            IPHONEOS_DEPLOYMENT_TARGET="$DEPLOYMENT_TARGET" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ChatGPTWebView.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -n 1 || true)"

          if [ -z "$APP_PATH" ]; then
            echo "Archive completed but no .app was found under Products/Applications." >&2
            exit 22
          fi

          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry ChatGPT-WebView-phase2-ios16-unsigned.ipa Payload)
          ls -lh build/ChatGPT-WebView-phase2-ios16-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-phase2-ios16-unsigned-ipa
          path: build/ChatGPT-WebView-phase2-ios16-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload generated Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-phase2-generated-xcode-project
          path: |
            ChatGPTWebView.xcodeproj
            project.yml
            ChatGPTWebView
            AppMemory
          if-no-files-found: error
          retention-days: 14
