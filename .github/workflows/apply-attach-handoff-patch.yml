name: Apply Attach Handoff Patch

on:
  push:
    branches:
      - codex/share-context-terminology
    paths:
      - ".github/attach-handoff-patch.py"

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/share-context-terminology
          fetch-depth: 0

      - name: Apply validated patch
        run: python3 .github/attach-handoff-patch.py

      - name: Remove temporary patch helpers
        run: |
          rm .github/attach-handoff-patch.py
          rm .github/workflows/apply-attach-handoff-patch.yml

      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix successful attachment handoff state"
          git push origin HEAD:codex/share-context-terminology
