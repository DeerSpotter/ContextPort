name: Patch Multi AI Navigation

on:
  push:
    branches:
      - codex/multi-ai-architecture
    paths:
      - ".github/workflows/patch-multi-ai-navigation.yml"

permissions:
  contents: write

jobs:
  patch-navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/multi-ai-architecture
          fetch-depth: 0

      - name: Patch automatic external navigation and bump build
        shell: python
        run: |
          from pathlib import Path

          store_path = Path("ChatGPTWebView/Web/ChatGPTWebViewStore.swift")
          store = store_path.read_text()
          old = '''        switch navigationAction.navigationType {
                  case .linkActivated, .formSubmitted, .other:
                      return true
                  default:
                      return navigationAction.targetFrame == nil
                  }
          '''
          new = '''        // WebKit reports server redirects and script-driven navigations as `.other`.
                  // Never launch Safari for those automatically. Only a direct user link tap may
                  // cross the provider WebView boundary and open externally.
                  return navigationAction.navigationType == .linkActivated
          '''
          if old not in store:
              raise SystemExit("Expected navigation policy block was not found")
          store_path.write_text(store.replace(old, new, 1))

          project_path = Path("project.yml")
          project = project_path.read_text()
          old_build = 'CURRENT_PROJECT_VERSION: "25"'
          new_build = 'CURRENT_PROJECT_VERSION: "26"'
          if old_build not in project:
              raise SystemExit("Expected build 25 was not found")
          project_path.write_text(project.replace(old_build, new_build, 1))

      - name: Verify patch
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          grep -F 'return navigationAction.navigationType == .linkActivated' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'CURRENT_PROJECT_VERSION: "26"' project.yml

      - name: Commit patch to PR branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChatGPTWebView/Web/ChatGPTWebViewStore.swift project.yml
          git commit -m "Prevent provider redirects from opening Safari"
          git push origin HEAD:codex/multi-ai-architecture
